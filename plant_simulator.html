<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Irrigation Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f7f6;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: white;
            padding: 2rem;
            text-align: center;
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        h1 {
            color: #2c3e50;
            font-size: 1.5rem;
            margin: 0 0 1rem 0;
        }

        /* The horizontal split container */
        .simulation-area {
            display: flex;
            flex-direction: row;
            flex-grow: 1;
            gap: 20px;
            margin-bottom: 20px;
            min-height: 0; /* Important for flex child scrolling/sizing */
        }

        /* Left Panel: Graph and Buttons */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        .button-group {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .chart-btn {
            padding: 8px 15px;
            cursor: pointer;
            border: 1px solid #3498db;
            background: white;
            color: #3498db;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }
        .chart-btn.active {
            background: #3498db;
            color: white;
        }
        .chart-container {
            flex-grow: 1;
            position: relative;
        }

        /* Right Panel: Plant Image and Status */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .image-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            background-color: #ecf0f1;
            overflow: hidden;
        }
        img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        #status-text {
            font-weight: bold;
            font-size: 1.1rem;
            padding: 12px;
            border-radius: 6px;
        }
        
        /* Slider at the bottom */
        .slider-container {
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            border: 1px solid #eee;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        
        /* Styling for the Finish button to match the End page */
.btn-finish-container {
    margin-top: 20px;
    padding-bottom: 20px;
}

.btn {
    display: inline-block;
    padding: 12px 30px;
    background-color: #40916c; /* The green from your end page */
    color: white;
    text-decoration: none;
    border: none; /* Remove default button border */
    border-radius: 5px;
    font-weight: bold;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.3s ease;
    font-family: inherit;
}

.btn:hover {
    background-color: #2d6a4f; /* Darker green on hover */
}
        
        /* Status Colors */
        .status-under { background-color: #fdeaea; color: #e74c3c; }
        .status-optimum { background-color: #eafaf1; color: #2ecc71; }
        .status-over { background-color: #ebf5fb; color: #3498db; }
    </style>
</head>
<body>

<div class="container">

    <div class="simulation-area">
        <div class="left-panel">
            <h1>Pick your soil type</h1>
            <div class="button-group">
                <button class="chart-btn active" onclick="updatePlot('A', this)">Sandy Soil</button>
                <button class="chart-btn" onclick="updatePlot('B', this)">Loamy Soil</button>
                <button class="chart-btn" onclick="updatePlot('C', this)">Clayey Soil</button>
            </div>
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
        </div>

        <div class="right-panel">
            <div class="image-container">
                <img id="plant-image" src="figure0.png" alt="Plant">
            </div>
            <div id="status-text" class="status-over">Start irrigation!</div>
        </div>
    </div>
    
    <div class="slider-container">
        <label for="irrigation">Irrigation Volume (ml):</label><br>
        <input type="range" id="irrigation" min="0" max="1000" step="5" value="0">
        <p><span id="volume-display">0</span> ml</p>
    </div>
    <div class="btn-finish-container">
        <button class="btn" onclick="window.location.href='end.html'">Finish</button>
    </div>


</div>

<script>
    const slider = document.getElementById('irrigation');
    const volumeDisplay = document.getElementById('volume-display');
    const plantImage = document.getElementById('plant-image');
    const statusText = document.getElementById('status-text');
    
    let currentTh1 = 0.090*1000; // Default for Sandy Soil
    let currentTh2 = 0.145*1000; // Default for Sandy Soil

    // --- CHART LOGIC ---
    const ctx = document.getElementById('myChart').getContext('2d');
    let currentChart;

    function generateData(formula) {
        const xValues = [0.01, 0.0215, 0.0464, 0.1, 0.215, 0.464, 1, 2.15, 4.64, 10, 21.5, 46.4, 100, 215, 464, 1000, 2150, 4640, 10000, 21500, 46400, 100000];
    
        return xValues.map(x => {
            let y;
            if (formula === 'A') y = 100 * (0.045 + (0.430 - 0.045) / Math.pow(1 + Math.pow(0.145 * x, 2.68), 0.6269));
            else if (formula === 'B') y = 100 * (0.067 + (0.450 - 0.067) / Math.pow(1 + Math.pow(0.020 * x, 1.41), 0.2908));
            else if (formula === 'C') y = 100 * (0.068 + (0.380 - 0.068) / Math.pow(1 + Math.pow(0.008 * x, 1.09), 0.0826));
        
            return { x: x, y: y }; // Return raw numbers for better chart scaling
        });
    }

    function updatePlot(type, btn) {
    // Update button styles
    document.querySelectorAll('.chart-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // --- NEW: Set thresholds based on soil type ---
    if (type === 'A') {      // Sandy
        currentTh1 = 0.090*1000;
        currentTh2 = 0.145*1000;
    } else if (type === 'B') { // Silt Loam
        currentTh1 = 0.32*1000;
        currentTh2 = 0.81*1000;
    } else if (type === 'C') { // Clayey
        currentTh1 = 0.63*1000;
        currentTh2 = 0.75*1000;
    }

    // After updating thresholds, manually trigger a slider update 
    // to refresh the plant image/text immediately
    slider.dispatchEvent(new Event('input'));

    const plotData = generateData(type);
        
        if (currentChart) currentChart.destroy();

currentChart = new Chart(ctx, {
type: 'line',
data: {
datasets: [
{
label: 'data points',
data: plotData,
borderColor: '#3498db',
tension: 0.1,
fill: false,
yAxisID: 'y'
},
// vertical line at x = 33
{
label: '-33k kPa (Field capacity)',
data: [
{ x: 33, y: 0 },
{ x: 33, y: 60 }
],
borderColor: 'rgba(46, 204, 113, 0.95)',
borderWidth: 1.5,
borderDash: [6, 6],
pointRadius: 0,
fill: false,
// ensure it doesn't appear in legend if you don't want it
showLine: true,
// put vertical line above main line
order: 2,
yAxisID: 'y'
},
// vertical line at x = 1500
{
label: '-1.5 MPa (Wilting point)',
data: [
{ x: 1500, y: 0 },
{ x: 1500, y: 60 }
],
borderColor: 'rgba(231, 76, 60, 0.95)',
borderWidth: 1.5,
borderDash: [6, 6],
pointRadius: 0,
fill: false,
showLine: true,
order: 2,
yAxisID: 'y'
}
]
},
options: {
responsive: true,
maintainAspectRatio: false,
plugins: {
legend: {
labels: {
filter: function(item) {
return !item.text.includes('threshold');
}
}
}
},
// plugin implementation (as array)
plugins: [{
id: 'verticalLineLabels',
afterDraw: (chart) => {
const ctx2 = chart.ctx;
const xScale = chart.scales.x;
const area = chart.chartArea;
const drawLabel = (xValue, text, color) => {
const xPixel = xScale.getPixelForValue(xValue);
const yPixel = area.top + 6;
ctx2.save();
ctx2.font = 'bold 12px "Segoe UI", Arial, sans-serif';
ctx2.fillStyle = color;
ctx2.textAlign = 'left';
ctx2.textBaseline = 'top';
ctx2.shadowColor = 'rgba(0,0,0,0.15)';
ctx2.shadowBlur = 2;
ctx2.fillText(text, xPixel + 6, yPixel);
ctx2.restore();
};
if (area && xScale) {
drawLabel(33, 'Field capacity', 'rgba(46,204,113,0.95)');
drawLabel(1500, 'Wilting point', 'rgba(231,76,60,0.95)');
}
}
}],
scales: {
x: {
type: 'logarithmic',
position: 'bottom',
min: 0.01,
max: 100000,
title: { display: true, text: 'Water Potential (-kPa)' },
ticks: {
callback: function(value) {
const exponent = Math.round(Math.log10(value));
if (Math.abs(Math.pow(10, exponent) - value) < 1e-10) {
const toSuperscript = (num) => {
const map = {
'0': '⁰', '1': '¹', '2': '²', '3': '³', '4': '⁴',
'5': '⁵', '6': '⁶', '7': '⁷', '8': '⁸', '9': '⁹', '-': '⁻'
};
return num.toString().split('').map(char => map[char] || char).join('');
};
return '10' + toSuperscript(exponent);
}
},
autoSkip: false,
maxRotation: 0
}
},
y: {
min: 0,
max: 60,
title: { display: true, text: 'Volumetric Water Content (%)' }
}
}
}
});
    }

    // Initialize with Plot A
    updatePlot('A', document.querySelector('.chart-btn'));

    // --- PLANT LOGIC ---
    slider.addEventListener('input', function() {
    const volume = parseFloat(this.value);
    volumeDisplay.textContent = volume.toFixed(1);

    if (volume <= currentTh1) {
        plantImage.src = 'figure1.png';
        statusText.textContent = 'Wilted (water content bellow the wilting point)';
        statusText.className = 'status-under';
    } 
    else if (volume > currentTh1 && volume <= currentTh2) {
        plantImage.src = 'figure2.png';
        statusText.textContent = 'Healthy (water content within the field capacity)';
        statusText.className = 'status-optimum';
    } 
    else {
        plantImage.src = 'figure3.png';
        statusText.textContent = 'Overwatered (beyond the field capacity)';
        statusText.className = 'status-over';
    }
});
</script>

</body>
</html>
